# Grype vulnerability scanner configuration
# For EU Cyber Resilience Act (CRA) compliance
# Documentation: https://github.com/anchore/grype#configuration

# Fail build on medium severity or higher
fail-on-severity: medium

# Check for database updates before scanning
check-for-app-update: true

# Configure output formatting
# Use CLI flags for output format (e.g., grype . -o table)
# output: table

# Vulnerability matching configuration
match:
  # Match strategies
  java:
    # Use Maven coordinates for Java dependencies
    using-cpes: false
  javascript:
    # Use npm package metadata
    using-cpes: false
  python:
    # Use PyPI metadata
    using-cpes: false

# Ignore rules for known false positives or accepted risks
# Add entries here as needed during development
ignore:
  # esbuild ships precompiled Go binaries with Go stdlib statically linked.
  # esbuild is a dev-only bundler pulled transitively by @angular-devkit/build-angular;
  # the binary runs only at build time and is never deployed to production.
  # Go stdlib CVEs are not reachable through esbuild's actual code paths
  # (read .ts/.js, write bundled output). Re-evaluate when esbuild releases
  # a build with a newer Go runtime, picked up via an Angular CLI update.
  - package:
      name: stdlib
      location: "**/bin/esbuild"

  # Angular 19.x advisories with NO fix anywhere in the 19.2.x line
  # (patched only in 20.3.25 / 21.2.17 / 22.0.1 — i.e. a major upgrade).
  # We are on Angular 19 and have already taken every available 19.2.x
  # patch (framework bumped to 19.2.25). Accepted risk until the planned
  # Angular v20 upgrade; remove these entries once that lands.
  - vulnerability: GHSA-39pv-4j6c-2g6v # @angular/common: HttpTransferCache weak 32-bit cache-key hashing
  - vulnerability: GHSA-48r7-hpm6-gfxm # @angular/common: formatDate DoS (OOM)
  - vulnerability: GHSA-rgjc-h3x7-9mwg # @angular/core: hydration DOM clobbering / response-cache poisoning
  - vulnerability: GHSA-58w9-8g37-x9v5 # @angular/compiler: two-way binding sanitization bypass (XSS)

# Registry configuration (if needed for private registries)
# registry:
#   auth:
#     - authority: registry.example.com
#       username: ${REGISTRY_USER}
#       password: ${REGISTRY_PASSWORD}

# Scope configuration
scope: all-layers  # Scan all dependency layers

# Database configuration
db:
  # Automatically update vulnerability database
  auto-update: true
  # Cache directory
  cache-dir: ~/.cache/grype/db
  # Update check frequency
  update-available-timeout: 60s
  # Validate database checksum
  validate-by-hash-on-start: true

# Logging configuration
log:
  # Log level: error, warn, info, debug, trace
  level: info
  # Write logs to file
  # file: grype.log

# Exclude paths from scanning (if needed)
exclude:
  # Example: Exclude test fixtures
  # - "**/test/**"
  # - "**/fixtures/**"
